name: Build and Preview AxelOS
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build-iso:
    runs-on: ubuntu-latest
    container:
      image: debian:testing
      options: --privileged
    steps:
    - name: Install System Dependencies
      run: apt-get update && apt-get install -y git live-build live-boot live-config systemd-container coreutils curl openssh-client x11vnc
    - name: Checkout Source Code
      uses: actions/checkout@v4
    - name: Execute Setup Script Configuration
      run: |
        chmod +x setup.sh
        ./setup.sh
    - name: Configure Live-Build
      run: lb config
    - name: Build ISO Image
      run: lb build
      
    - name: Rename ISO to axelos
      run: |
        # Dynamically find whatever .iso was built and rename it to axelos.iso
        mv *.iso axelos-amd64.iso

    - name: Create GitHub Release and Upload ISO
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v0.1-phase1"
        name: "AxelOS v0.1 (Minimal Base)"
        body: "Automated build of minimal Debian Testing base. Text-mode only."
        files: axelos-amd64.iso
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Launch Instant Browser Preview via Pinggy
      run: |
        apt-get install -y qemu-system-x86 novnc websockify x11vnc
        qemu-system-x86_64 -m 2560 -smp 2 -cpu max -cdrom *.iso -vnc :1 &
        websockify --web=/usr/share/novnc/ 6080 localhost:5901 &
        sleep 5
        
        # FIXED: Embedded absolute idle connection timeout kill metric parameter (30 Minutes = 1800 Seconds)
        ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=10 -p 443 -R0:localhost:6080 a.pinggy.io > pinggy.log 2>&1 &
        
        # Run background monitoring checking loops to handle the inactivity window drop
        (sleep 1800 && killall qemu-system-x86_64 websockify ssh) &
        sleep 5
        
        echo "=================================================================="
        echo "? COPY AND PASTE YOUR PREVIEW LINK FROM THE LOG ROWS BELOW:"
        cat pinggy.log
        echo "=================================================================="
        echo "? Add '/vnc.html?autoconnect=true' to the end of your link URL!"
        echo "=================================================================="
        sleep 1830
